controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    arm_controller:
      type: position_controllers/JointGroupPositionController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

arm_controller:
  ros__parameters:
    joints:
      - j0_base_yaw
      - j1_shoulder_pitch
      - j2_elbow_pitch
      - j3_wrist_pitch
      - j4_wrist_roll
      - left_finger_joint

joint_state_broadcaster:
  ros__parameters:
    publish_rate: 50.0
