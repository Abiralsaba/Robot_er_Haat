controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    arm_controller:
      type: position_controllers/JointGroupPositionController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

arm_controller:
  ros__parameters:
    joints:
      - joint_1_base_yaw
      - joint_2_shoulder_pitch
      - joint_3_elbow_pitch
      - joint_4_wrist_roll
      - joint_5_wrist_pitch
      - left_finger_joint

joint_state_broadcaster:
  ros__parameters:
    publish_rate: 50.0
